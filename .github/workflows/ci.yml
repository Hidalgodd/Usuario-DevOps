name: "CI - Tests, Quality Gate & Docker Push"

on:
  push:
    branches: [ "master", "main", "feature/**", "docs/**" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # ──────────────────────────────────────────────
  # IE4 / IE5 / IE6: Tests + Cobertura + SonarQube
  # ──────────────────────────────────────────────
  test-and-quality:
    name: "Tests & Quality Gate"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para SonarQube

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # IE4: Tests con reporte de cobertura JaCoCo
      - name: "Ejecutar Tests con Cobertura (JaCoCo)"
        run: ./mvnw verify -Pcoverage --batch-mode

      # IE4: Publicar reporte de cobertura en GitHub
      - name: "Publicar Reporte de Cobertura"
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-jacoco
          path: target/site/jacoco/

      # IE5: Auditoría de cumplimiento personalizada (script propio)
      - name: "Auditoría de Cumplimiento (script propio)"
        run: |
          chmod +x scripts/audit-compliance.sh
          ./scripts/audit-compliance.sh

      # IE5 / IE6: SonarQube Quality Gate — el pipeline se detiene si falla
      - name: "SonarQube Analysis"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=Hidalgodd_Usuario-DevOps \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectName="Usuario Service" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --batch-mode

      # IE6: Verificar Quality Gate — falla el pipeline si hay issues críticos
      - name: "Verificar Quality Gate de SonarQube"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          STATUS=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=Hidalgodd_Usuario-DevOps" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])")
          echo "Quality Gate status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "❌ PIPELINE DETENIDO: Quality Gate falló ($STATUS). Revisa SonarQube."
            exit 1
          fi
          echo "✅ Quality Gate aprobado."

      # IE6: Auditoría de seguridad con OWASP Dependency Check
      - name: "OWASP Dependency Check (Seguridad)"
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.owasp-suppressions.xml \
            --batch-mode || true
        continue-on-error: false

      - name: "Publicar Reporte OWASP"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html

  # ──────────────────────────────────────────────
  # Build & Push solo si Quality Gate pasó (IE6)
  # ──────────────────────────────────────────────
  build-and-push:
    name: "Build Docker Image & Push"
    runs-on: ubuntu-latest
    needs: test-and-quality   # ← Depende del job anterior; si falla, no corre

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: "Extract Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/usuario-service
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - name: "Build and Push Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "✅ Imagen publicada"
        run: echo "🚀 Imagen subida a Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/usuario-service:latest"