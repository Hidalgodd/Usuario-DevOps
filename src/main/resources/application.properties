spring.application.name=usuario-service

server.port=8081

# ===== BASE DE DATOS H2 =====
spring.datasource.url=jdbc:h2:mem:usuariodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT =====
jwt.secret=homemed-super-secreto-cambiar-en-produccion-2026-1234567890
jwt.expiration-ms=3600000

# ===== ACTUATOR / PROMETHEUS =====
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoints.web.base-path=/actuator
management.metrics.tags.application=${spring.application.name}

# ===== TRAZAS: OpenTelemetry → Tempo =====
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.tracing.propagation.type=W3C

# ===== LOGS =====
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]