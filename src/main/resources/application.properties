spring.application.name=usuario-service

server.port=8081

# ===== BASE DE DATOS =====
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===== JWT =====
jwt.secret=homemed-super-secreto-cambiar-en-produccion-2026-1234567890
jwt.expiration-ms=3600000

# ===== ACTUATOR / PROMETHEUS =====
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoints.web.base-path=/actuator
management.metrics.tags.application=${spring.application.name}

# ===== TRAZAS: OpenTelemetry → Tempo =====
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.tracing.propagation.type=W3C

# ===== LOGS: Correlación de traceId/spanId en cada línea =====
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
