global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'usuario-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['usuario-service:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'usuario-service'
